naftiko: 1.0.0-alpha2
info:
  label: AviationStack API
  description: 'AviationStack API. 11 operations. Lead operation: Aircraft type classifications. Self-contained Naftiko capability
    covering one Aviationstack business surface.'
  tags:
  - Aviationstack
  - AviationStack API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AVIATIONSTACK_API_KEY: AVIATIONSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: aviationstack
    baseUri: https://aviationstack.com
    description: AviationStack API business capability. Self-contained, no shared references.
    resources:
    - name: v1-aircraft_types
      path: /v1/aircraft_types
      operations:
      - name: get
        method: GET
        description: Aircraft type classifications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-airlines
      path: /v1/airlines
      operations:
      - name: get
        method: GET
        description: Airline data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-airplanes
      path: /v1/airplanes
      operations:
      - name: get
        method: GET
        description: Aircraft information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-airports
      path: /v1/airports
      operations:
      - name: get
        method: GET
        description: Global airport information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-cities
      path: /v1/cities
      operations:
      - name: get
        method: GET
        description: City destination data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-countries
      path: /v1/countries
      operations:
      - name: get
        method: GET
        description: Country information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-flights
      path: /v1/flights
      operations:
      - name: get
        method: GET
        description: Real-time and historical flights
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-flightsFuture
      path: /v1/flightsFuture
      operations:
      - name: get
        method: GET
        description: Future flight schedule data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-routes
      path: /v1/routes
      operations:
      - name: get
        method: GET
        description: Airline route data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-taxes
      path: /v1/taxes
      operations:
      - name: get
        method: GET
        description: Aviation tax information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-timetable
      path: /v1/timetable
      operations:
      - name: get
        method: GET
        description: Real-time flight schedule for current day
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: aviationstack-rest
    port: 8080
    description: REST adapter for AviationStack API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v1/aircraft-types
      name: v1-aircraft-types
      description: REST surface for v1-aircraft_types.
      operations:
      - method: GET
        name: get
        description: Aircraft type classifications
        call: aviationstack.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/airlines
      name: v1-airlines
      description: REST surface for v1-airlines.
      operations:
      - method: GET
        name: get
        description: Airline data
        call: aviationstack.get
        outputParameters:
